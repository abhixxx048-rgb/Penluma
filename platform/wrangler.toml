# Cloudflare Pages configuration.

name = "penluma"
compatibility_date = "2025-06-01"
compatibility_flags = ["nodejs_compat"]
pages_build_output_dir = "dist"

# ---------------------------------------------------------------------------
# KV namespace — powers per-post view counts, likes, and newsletter signups.
# OPTIONAL: the site deploys and runs fine without it (those endpoints no-op).
#
# To enable, run once:
#   npx wrangler kv namespace create BLOG_KV
# then paste the printed id below and UNCOMMENT the two lines:
#
# [[kv_namespaces]]
# binding = "BLOG_KV"
# id = "PASTE_YOUR_KV_NAMESPACE_ID_HERE"
# ---------------------------------------------------------------------------
